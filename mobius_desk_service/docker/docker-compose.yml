version: '3.8'
services:
  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: 123456
      MONGO_INITDB_DATABASE: mobius_desk
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7.0
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  coturn:
    image: coturn/coturn:latest
    network_mode: host
    environment:
      - REALM=mobius-desk
      - MIN_PORT=49152
      - MAX_PORT=65535

volumes:
  mongo_data:
  redis_data: